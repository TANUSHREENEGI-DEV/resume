<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Button Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="button-row">
    <button class="btn solid">Solid</button>
    <button class="btn outline">Outline</button>
    <button class="btn pill">Pill</button>
    <button class="btn accent">Accent</button>
  </div>

  <p class="hint">Top row = normal · hover over each button to see the hover state</p>

</body>
</html>
